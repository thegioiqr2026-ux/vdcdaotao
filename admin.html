<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VDC Admin System - V3.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.18.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.18.0/firebase-database-compat.js"></script>
</head>
<body class="bg-gray-100 font-sans">

    <div class="container mx-auto px-4 py-8">
        <header class="flex justify-between items-center mb-8 bg-white p-6 rounded-lg shadow-sm">
            <div>
                <h1 class="text-2xl font-bold text-blue-700">VDC SYSTEM ADMIN</h1>
                <p class="text-gray-500">Quản lý nhân viên & Phê duyệt truy cập</p>
            </div>
            <div class="text-right text-sm text-gray-400">Version 3.0</div>
        </header>

        <!-- BẢNG DANH SÁCH NHÂN VIÊN -->
        <div class="bg-white rounded-lg shadow-md overflow-hidden">
            <table class="min-w-full leading-normal">
                <thead>
                    <tr>
                        <th class="px-5 py-3 border-b-2 border-gray-200 bg-gray-50 text-left text-xs font-semibold text-gray-600 uppercase tracking-wider">Họ và Tên</th>
                        <th class="px-5 py-3 border-b-2 border-gray-200 bg-gray-50 text-left text-xs font-semibold text-gray-600 uppercase tracking-wider">Email</th>
                        <th class="px-5 py-3 border-b-2 border-gray-200 bg-gray-50 text-left text-xs font-semibold text-gray-600 uppercase tracking-wider">Trạng thái</th>
                        <th class="px-5 py-3 border-b-2 border-gray-200 bg-gray-50 text-center text-xs font-semibold text-gray-600 uppercase tracking-wider">Điều khiển</th>
                    </tr>
                </thead>
                <tbody id="user-table-body">
                    <!-- Dữ liệu sẽ đổ vào đây từ Firebase -->
                    <tr>
                        <td colspan="4" class="px-5 py-5 text-center text-gray-500">Đang tải danh sách...</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        // CẤU HÌNH FIREBASE CỦA ANH CÔNG ĐẸP
        const firebaseConfig = {
            apiKey: "AIzaSyCzWjfcD5Dgq7V-i2izb9tKLR6QM6qWPQo",
            authDomain: "tavietnam-78ae8.firebaseapp.com",
            projectId: "tavietnam-78ae8",
            storageBucket: "tavietnam-78ae8.firebasestorage.app",
            messagingSenderId: "670121705534",
            appId: "1:670121705534:web:1027ad98550573ad37116f"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // Hàm lấy danh sách người dùng
        function loadUsers() {
            const userTable = document.getElementById('user-table-body');
            
            db.ref('AccessControl').on('value', (snapshot) => {
                userTable.innerHTML = '';
                const data = snapshot.val();

                if (!data) {
                    userTable.innerHTML = '<tr><td colspan="4" class="px-5 py-5 text-center">Chưa có nhân viên nào đăng ký.</td></tr>';
                    return;
                }

                Object.keys(data).forEach(key => {
                    const user = data[key];
                    const safeEmail = key; // Email đã replace dấu chấm
                    const isAllowed = user.allowed;

                    const row = `
                        <tr class="hover:bg-gray-50 transition">
                            <td class="px-5 py-5 border-b border-gray-200 bg-white text-sm">
                                <p class="text-gray-900 whitespace-no-wrap font-bold">${user.name || 'N/A'}</p>
                            </td>
                            <td class="px-5 py-5 border-b border-gray-200 bg-white text-sm">
                                <p class="text-gray-600 whitespace-no-wrap">${user.email}</p>
                            </td>
                            <td class="px-5 py-5 border-b border-gray-200 bg-white text-sm text-center">
                                ${isAllowed 
                                    ? '<span class="relative inline-block px-3 py-1 font-semibold text-green-900 leading-tight"><span aria-hidden class="absolute inset-0 bg-green-200 opacity-50 rounded-full"></span><span class="relative text-xs">ĐÃ DUYỆT</span></span>' 
                                    : '<span class="relative inline-block px-3 py-1 font-semibold text-orange-900 leading-tight"><span aria-hidden class="absolute inset-0 bg-orange-200 opacity-50 rounded-full"></span><span class="relative text-xs">CHỜ DUYỆT</span></span>'}
                            </td>
                            <td class="px-5 py-5 border-b border-gray-200 bg-white text-sm text-center">
                                <button onclick="toggleAccess('${safeEmail}', ${isAllowed})" 
                                    class="${isAllowed ? 'bg-red-500 hover:bg-red-600' : 'bg-green-500 hover:bg-green-600'} text-white font-bold py-2 px-4 rounded text-xs transition duration-200">
                                    ${isAllowed ? 'KHÓA' : 'PHÊ DUYỆT'}
                                </button>
                            </td>
                        </tr>
                    `;
                    userTable.innerHTML += row;
                });
            });
        }

        // Hàm Phê duyệt / Khóa tài khoản
        function toggleAccess(safeEmail, currentStatus) {
            const newStatus = !currentStatus;
            const action = newStatus ? "Phê duyệt" : "Khóa";
            
            if(confirm(`Anh có chắc chắn muốn ${action} tài khoản này không?`)) {
                db.ref('AccessControl/' + safeEmail).update({
                    allowed: newStatus
                }).then(() => {
                    console.log("Cập nhật thành công");
                }).catch((error) => {
                    alert("Lỗi: " + error.message);
                });
            }
        }

        // Chạy hàm khi trang web tải xong
        window.onload = loadUsers;
    </script>
</body>
</html>
