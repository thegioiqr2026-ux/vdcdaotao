<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VDC Admin - Quản lý truy cập</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f6f9; margin: 0; padding: 20px; }
        .container { max-width: 800px; margin: auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h2 { color: #2c3e50; text-align: center; border-bottom: 2px solid #3498db; padding-bottom: 10px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #ddd; }
        th { background-color: #3498db; color: white; }
        tr:hover { background-color: #f1f1f1; }
        .btn-toggle { padding: 6px 12px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; color: white; }
        .btn-allow { background-color: #2ecc71; }
        .btn-block { background-color: #e74c3c; }
    </style>
    <!-- Tích hợp Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
</head>
<body>
    <div class="container">
        <h2>THỐNG KÊ NGƯỜI DÙNG PHẦN MỀM VDC</h2>
        <table>
            <thead>
                <tr>
                    <th>Email Người Dùng</th>
                    <th>Trạng thái</th>
                    <th>Hành động</th>
                </tr>
            </thead>
            <tbody id="user-table-body">
                <tr><td colspan="3" style="text-align: center;">Đang tải dữ liệu...</td></tr>
            </tbody>
        </table>
    </div>

    <script>
        // Cấu hình Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyCzWjfcD5Dgq7V-i2izb9tKLR6QM6qWPQo",
            authDomain: "tavietnam-78ae8.firebaseapp.com",
            projectId: "tavietnam-78ae8",
            storageBucket: "tavietnam-78ae8.firebasestorage.app",
            messagingSenderId: "670121705534",
            appId: "1:670121705534:web:1027ad98550573ad37116f"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // Lắng nghe dữ liệu
        db.ref('AccessControl').on('value', (snapshot) => {
            const tbody = document.getElementById('user-table-body');
            tbody.innerHTML = '';
            
            const data = snapshot.val();
            if (!data) {
                tbody.innerHTML = '<tr><td colspan="3" style="text-align: center;">Chưa có người dùng nào</td></tr>';
                return;
            }

            for (let key in data) {
                let user = data[key];
                let statusText = user.allowed ? "<span style='color:green;font-weight:bold;'>Đang hoạt động</span>" : "<span style='color:red;font-weight:bold;'>Đã bị khóa</span>";
                let btnClass = user.allowed ? "btn-block" : "btn-allow";
                let btnText = user.allowed ? "Khóa ngay" : "Mở khóa";

                let tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>${user.email}</td>
                    <td>${statusText}</td>
                    <td><button class="btn-toggle ${btnClass}" onclick="toggleAccess('${key}', ${!user.allowed})">${btnText}</button></td>
                `;
                tbody.appendChild(tr);
            }
        });

        // Hàm thay đổi quyền
        window.toggleAccess = function(key, newStatus) {
            db.ref('AccessControl/' + key).update({ allowed: newStatus })
              .then(() => alert("Cập nhật quyền thành công!"))
              .catch(err => alert("Lỗi: " + err.message));
        }
    </script>
</body>
</html>
