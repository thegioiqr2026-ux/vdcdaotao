<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VDC - In Thẻ An Toàn v1.8</title>
    <script src="https://unpkg.com/docx@8.2.2/build/index.umd.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    <style>
        :root { --vdc-gold: #d4a017; --vdc-blue: #003366; }
        body { font-family: 'Times New Roman', serif; background: #f0f2f5; padding: 20px; }
        .app-container { max-width: 1100px; margin: auto; background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .version { float: right; font-size: 12px; color: #888; }
        h2 { color: var(--vdc-blue); text-align: center; border-bottom: 2px solid var(--vdc-gold); padding-bottom: 10px; }
        
        .setup-section { background: #fafafa; padding: 20px; border-radius: 5px; margin-bottom: 20px; display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; }
        .setup-section label { font-weight: bold; font-size: 13px; display: block; margin-bottom: 5px; }
        .setup-section input { width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }

        table { width: 100%; border-collapse: collapse; margin-top: 15px; background: white; }
        th { background: var(--vdc-blue); color: white; padding: 10px; font-size: 12px; }
        td { border: 1px solid #ddd; padding: 5px; }
        .input-row { width: 100%; border: none; outline: none; padding: 5px; }

        .btn-group { display: flex; gap: 10px; justify-content: center; margin-top: 25px; }
        .btn { padding: 12px 25px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; color: white; transition: 0.3s; }
        .btn-add { background: #28a745; }
        .btn-front { background: var(--vdc-blue); }
        .btn-back { background: var(--vdc-gold); }
        .btn:hover { opacity: 0.9; transform: translateY(-1px); }
    </style>
</head>
<body>

<div class="app-container">
    <span class="version">Version 1.8</span>
    <h2>Hệ thống In Thẻ An Toàn VDC (Chuẩn 3x3)</h2>

    <div class="setup-section">
        <div><label>Đơn vị cấp thẻ</label><input type="text" id="issuer" value="CÔNG TY CỔ PHẦN HỢP TÁC QUỐC TẾ VDC"></div>
        <div><label>Nội dung huấn luyện</label><input type="text" id="course" value="An toàn vệ sinh lao động - Nhóm 3"></div>
        <div><label>Địa điểm & Ngày cấp</label><input type="text" id="locDate" value="Thanh Hóa, ngày 21 tháng 03 năm 2026"></div>
        <div><label>Từ ngày học</label><input type="date" id="sDate" value="2026-03-19"></div>
        <div><label>Đến ngày học</label><input type="date" id="eDate" value="2026-03-20"></div>
        <div><label>Thời hạn đến</label><input type="text" id="expiry" value="21/03/2028"></div>
    </div>

    <table>
        <thead>
            <tr>
                <th width="5%">STT</th>
                <th>Họ và tên</th>
                <th>Năm sinh</th>
                <th>Công việc</th>
                <th>Mã thẻ</th>
                <th width="5%">Xóa</th>
            </tr>
        </thead>
        <tbody id="studentBody">
            <tr>
                <td align="center">1</td>
                <td><input type="text" class="st-name input-row" value="Nguyễn Minh Hòa"></td>
                <td><input type="text" class="st-dob input-row" value="01/01/1967"></td>
                <td><input type="text" class="st-job input-row" value="Phòng M&E"></td>
                <td><input type="text" class="st-code input-row" value="VDC-N3-001"></td>
                <td align="center"><button onclick="this.parentElement.parentElement.remove()" style="color:red; border:none; background:none; cursor:pointer">✖</button></td>
            </tr>
        </tbody>
    </table>

    <div class="btn-group">
        <button class="btn btn-add" onclick="addRow()">+ Thêm Học Viên</button>
        <button class="btn btn-front" onclick="exportCards('FRONT')">Xuất Mặt Trước (Chuẩn 3x3)</button>
        <button class="btn btn-back" onclick="exportCards('BACK')">Xuất Mặt Sau (Chuẩn 3x3)</button>
    </div>
</div>

<script>
    function addRow() {
        const body = document.getElementById("studentBody");
        const count = body.rows.length + 1;
        const row = body.insertRow(-1);
        row.innerHTML = `<td align="center">${count}</td><td><input type="text" class="st-name input-row"></td><td><input type="text" class="st-dob input-row"></td><td><input type="text" class="st-job input-row"></td><td><input type="text" class="st-code input-row"></td><td align="center"><button onclick="this.parentElement.parentElement.remove()" style="color:red; border:none; background:none; cursor:pointer">✖</button></td>`;
    }

    async function exportCards(side) {
        const { Document, Packer, Paragraph, TextRun, Table, TableRow, TableCell, WidthType, AlignmentType, BorderStyle } = window.docx;
        const students = Array.from(document.querySelectorAll("#studentBody tr")).map(tr => ({
            name: tr.querySelector(".st-name").value,
            dob: tr.querySelector(".st-dob").value,
            job: tr.querySelector(".st-job").value,
            code: tr.querySelector(".st-code").value
        }));

        const issuer = document.getElementById("issuer").value;
        const course = document.getElementById("course").value;
        const locDate = document.getElementById("locDate").value;
        const sDate = document.getElementById("sDate").value;
        const eDate = document.getElementById("eDate").value;
        const expiry = document.getElementById("expiry").value;

        // Xây dựng lưới 3x3
        const tableRows = [];
        for (let i = 0; i < 9; i += 3) {
            const cells = [];
            for (let j = 0; j < 3; j++) {
                const st = students[i + j] || { name: "", dob: "", job: "", code: "" };
                const cellContent = [];
                
                if (side === 'FRONT') { // Mặt trước [cite: 749]
                    cellContent.push(
                        new Paragraph({ children: [new TextRun({ text: issuer, bold: true, size: 16 })], alignment: AlignmentType.CENTER }),
                        new Paragraph({ children: [new TextRun({ text: "THẺ AN TOÀN LAO ĐỘNG", bold: true, color: "FF0000", size: 18 })], alignment: AlignmentType.CENTER }),
                        new Paragraph({ children: [new TextRun({ text: `Số: ${st.code}`, size: 14 })], alignment: AlignmentType.RIGHT }),
                        new Paragraph({ text: "[Ảnh 3x4]", alignment: AlignmentType.LEFT }) // Placeholder cho ảnh
                    );
                } else { // Mặt sau [cite: 748]
                    cellContent.push(
                        new Paragraph({ children: [new TextRun({ text: "CỘNG HÒA XÃ HỘI CHỦ NGHĨA VIỆT NAM", bold: true, size: 14 })], alignment: AlignmentType.CENTER }),
                        new Paragraph({ children: [new TextRun({ text: "Độc lập - Tự do - Hạnh phúc", size: 14 })], alignment: AlignmentType.CENTER }),
                        new Paragraph({ children: [new TextRun({ text: "THẺ AN TOÀN LAO ĐỘNG", bold: true, size: 18 })], alignment: AlignmentType.CENTER, spacing: { before: 100 } }),
                        new Paragraph({ children: [new TextRun({ text: `Họ và tên: ${st.name}`, bold: true })] }),
                        new Paragraph({ children: [new TextRun({ text: `Năm sinh: ${st.dob}` })] }),
                        new Paragraph({ children: [new TextRun({ text: `Công việc: ${st.job}` })] }),
                        new Paragraph({ children: [new TextRun({ text: `Nội dung HL: ${course}` })] }),
                        new Paragraph({ children: [new TextRun({ text: `Thời hạn: ${expiry}`, bold: true })] })
                    );
                }

                cells.push(new TableCell({
                    children: cellContent,
                    width: { size: 33, type: WidthType.PERCENTAGE },
                    borders: { top: {style: BorderStyle.DASH_SMALL}, bottom: {style: BorderStyle.DASH_SMALL}, left: {style: BorderStyle.DASH_SMALL}, right: {style: BorderStyle.DASH_SMALL} },
                    padding: { top: 200, bottom: 200, left: 200, right: 200 }
                }));
            }
            tableRows.push(new TableRow({ children: cells, height: { value: 3000, rule: "exact" } }));
        }

        const doc = new Document({
            sections: [{
                properties: { page: { margin: { top: 500, bottom: 500, left: 500, right: 500 } } },
                children: [new Table({ rows: tableRows, width: { size: 100, type: WidthType.PERCENTAGE } })]
            }]
        });

        const blob = await Packer.toBlob(doc);
        saveAs(blob, `The_An_Toan_VDC_${side}.docx`);
    }
</script>
</body>
</html>
