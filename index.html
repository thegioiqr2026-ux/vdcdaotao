<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VDC Đào tạo - Xuất Hồ sơ Hàng loạt v1.6</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/docx/8.2.2/index.umd.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>
    <style>
        :root { --vdc-gold: #d4a017; --vdc-blue: #003366; }
        body { font-family: 'Times New Roman', serif; background: #f4f4f4; padding: 20px; }
        .app-card { max-width: 1100px; margin: auto; background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); border-top: 6px solid var(--vdc-gold); }
        .version-tag { float: right; font-size: 12px; color: #999; font-weight: bold; }
        h2 { color: var(--vdc-blue); text-align: center; text-transform: uppercase; margin-bottom: 30px; }
        .form-section { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 20px; margin-bottom: 25px; background: #fafafa; padding: 20px; border-radius: 5px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; font-size: 14px; }
        input, select { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        
        /* Student Table */
        .table-container { overflow-x: auto; margin-top: 20px; }
        table { width: 100%; border-collapse: collapse; background: white; }
        th { background: var(--vdc-blue); color: white; padding: 12px; font-size: 13px; }
        td { border: 1px solid #ddd; padding: 8px; }
        .input-inline { border: none; width: 100%; padding: 5px; outline: none; }
        
        .btn-group { display: flex; gap: 15px; margin-top: 30px; justify-content: center; }
        .btn { padding: 12px 25px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; transition: 0.3s; text-transform: uppercase; }
        .btn-add { background: #28a745; color: white; }
        .btn-gcn { background: var(--vdc-gold); color: white; }
        .btn-the { background: var(--vdc-blue); color: white; }
        .btn:hover { opacity: 0.9; transform: translateY(-1px); }
    </style>
</head>
<body>

<div class="app-card">
    <span class="version-tag">Dự án: VDC Đào tạo | v1.6</span>
    <h2>Hệ thống Cấp chứng nhận & Thẻ an toàn</h2>

    <div class="form-section">
        <div>
            <label>Đơn vị tham gia (Công ty)</label>
            <input type="text" id="companyName" placeholder="Tên khách hàng...">
        </div>
        <div>
            <label>Ngày huấn luyện (Từ ngày)</label>
            <input type="date" id="startDate">
        </div>
        <div>
            <label>Đến ngày</label>
            <input type="date" id="endDate">
        </div>
        <div>
            <label>Số Quyết định (Nếu có)</label>
            <input type="text" id="decisionNo" placeholder=".../2026/QĐ-VDC">
        </div>
        <div>
            <label>Nhóm huấn luyện</label>
            <select id="groupSelect">
                <option value="1">Nhóm 1</option>
                <option value="2">Nhóm 2</option>
                <option value="3">Nhóm 3</option>
                <option value="4">Nhóm 4</option>
                <option value="5">Nhóm 5</option>
                <option value="6">Nhóm 6</option>
            </select>
        </div>
        <div>
            <label>Thời hạn hiệu lực (Năm)</label>
            <input type="number" id="expiryYears" value="2">
        </div>
    </div>

    <div class="table-container">
        <button class="btn btn-add" onclick="addRow()">+ Thêm dòng học viên</button>
        <table id="studentTable">
            <thead>
                <tr>
                    <th width="5%">STT</th>
                    <th>Họ và tên</th>
                    <th>Ngày sinh</th>
                    <th>Số CMND / CCCD</th>
                    <th>Chức vụ / Công việc</th>
                    <th width="5%">Xóa</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td style="text-align:center">1</td>
                    <td><input type="text" class="row-name input-inline"></td>
                    <td><input type="text" class="row-dob input-inline" placeholder="dd/mm/yyyy"></td>
                    <td><input type="text" class="row-id input-inline"></td>
                    <td><input type="text" class="row-job input-inline"></td>
                    <td><button onclick="this.parentElement.parentElement.remove()" style="color:red; border:none; background:none; cursor:pointer">✖</button></td>
                </tr>
            </tbody>
        </table>
    </div>

    <div class="btn-group">
        <button class="btn btn-gcn" onclick="generateBatch('GCN')">Xuất Giấy chứng nhận hàng loạt</button>
        <button class="btn btn-the" onclick="generateBatch('THE')">Xuất Thẻ an toàn hàng loạt</button>
    </div>
</div>

<script>
    // Cập nhật Firebase Config mới [cite: 2025-12-16]
    const firebaseConfig = {
        apiKey: "AIzaSyDC8A3PJ7D05SFdo6FT8Y1XbhLALJWK5Mk",
        authDomain: "vdcdaotao-bb832.firebaseapp.com",
        projectId: "vdcdaotao-bb832",
        storageBucket: "vdcdaotao-bb832.firebasestorage.app",
        messagingSenderId: "1033996249004",
        appId: "1:1033996249004:web:fa07039eb5c08d5ac43c09",
        measurementId: "G-CJRQYVBQSW"
    };
    firebase.initializeApp(firebaseConfig);

    function addRow() {
        const table = document.getElementById("studentTable").getElementsByTagName('tbody')[0];
        const rowCount = table.rows.length + 1;
        const row = table.insertRow(-1);
        row.innerHTML = `
            <td style="text-align:center">${rowCount}</td>
            <td><input type="text" class="row-name input-inline"></td>
            <td><input type="text" class="row-dob input-inline" placeholder="dd/mm/yyyy"></td>
            <td><input type="text" class="row-id input-inline"></td>
            <td><input type="text" class="row-job input-inline"></td>
            <td><button onclick="this.parentElement.parentElement.remove()" style="color:red; border:none; background:none; cursor:pointer">✖</button></td>
        `;
    }

    async function generateBatch(type) {
        const { Document, Packer, Paragraph, TextRun, AlignmentType, PageBreak, Table, TableRow, TableCell, WidthType, BorderStyle } = window.docx;
        const students = [];
        const tableRows = document.querySelectorAll("#studentTable tbody tr");
        
        // Thông tin chung [cite: 311, 313]
        const comp = document.getElementById("companyName").value || "..................";
        const group = document.getElementById("groupSelect").value;
        const sDate = document.getElementById("startDate").value || "..../..../....";
        const eDate = document.getElementById("endDate").value || "..../..../....";
        
        tableRows.forEach(tr => {
            const name = tr.querySelector(".row-name").value;
            if(name) {
                students.push({
                    name: name,
                    dob: tr.querySelector(".row-dob").value || "..../..../....",
                    id: tr.querySelector(".row-id").value || "................",
                    job: tr.querySelector(".row-job").value || "................"
                });
            }
        });

        if (students.length === 0) { alert("Vui lòng nhập ít nhất một học viên!"); return; }

        const content = [];
        students.forEach((st, i) => {
            if (type === 'GCN') {
                // Mẫu Giấy Chứng Nhận [cite: 647, 655, 660]
                content.push(
                    new Paragraph({ children: [new TextRun({ text: "CÔNG TY CỔ PHẦN HỢP TÁC QUỐC TẾ VDC", bold: true, size: 24 })], alignment: AlignmentType.CENTER }),
                    new Paragraph({ children: [new TextRun({ text: "GIẤY CHỨNG NHẬN HUẤN LUYỆN", bold: true, size: 44 })], alignment: AlignmentType.CENTER, spacing: { before: 400 } }),
                    new Paragraph({ children: [new TextRun({ text: "AN TOÀN, VỆ SINH LAO ĐỘNG", bold: true, size: 32 })], alignment: AlignmentType.CENTER, spacing: { after: 600 } }),
                    
                    new Paragraph({ children: [new TextRun({ text: `Họ và tên: ${st.name}`, bold: true, size: 28 })] }),
                    new Paragraph({ children: [new TextRun({ text: `Ngày sinh: ${st.dob}` })] }),
                    new Paragraph({ children: [new TextRun({ text: `Số CMND/CCCD: ${st.id}` })] }),
                    new Paragraph({ children: [new TextRun({ text: `Đối tượng huấn luyện: Nhóm ${group}` })] }),
                    new Paragraph({ children: [new TextRun({ text: `Đơn vị công tác: ${comp}` })] }),
                    new Paragraph({ children: [new TextRun({ text: `Đã hoàn thành khóa huấn luyện từ ngày ${sDate} đến ngày ${eDate}` })] }),
                    new Paragraph({ children: [new TextRun({ text: `Kết quả: Khá`, italic: true })], spacing: { after: 800 } }),
                    
                    new Paragraph({ children: [new TextRun({ text: "Thanh Hóa, ngày .... tháng .... năm 20...", italic: true })], alignment: AlignmentType.RIGHT }),
                    new Paragraph({ children: [new TextRun({ text: "TỔNG GIÁM ĐỐC", bold: true })], alignment: AlignmentType.RIGHT })
                );
            } else {
                // Mẫu Thẻ An Toàn [cite: 687, 689, 336]
                content.push(
                    new Table({
                        width: { size: 100, type: WidthType.PERCENTAGE },
                        rows: [
                            new TableRow({
                                children: [
                                    new TableCell({
                                        children: [
                                            new Paragraph({ children: [new TextRun({ text: "THẺ AN TOÀN LAO ĐỘNG", bold: true, size: 24 })], alignment: AlignmentType.CENTER }),
                                            new Paragraph({ children: [new TextRun({ text: `Họ tên: ${st.name}`, bold: true })] }),
                                            new Paragraph({ children: [new TextRun({ text: `Công việc: ${st.job}` })] }),
                                            new Paragraph({ children: [new TextRun({ text: `Đơn vị: ${comp}` })] }),
                                            new Paragraph({ children: [new TextRun({ text: `Nhóm huấn luyện: ${group}` })] }),
                                            new Paragraph({ children: [new TextRun({ text: "Thời hạn: 02 năm", size: 18, italic: true })] })
                                        ],
                                        padding: { top: 200, bottom: 200, left: 200, right: 200 },
                                        borders: { top: {style: BorderStyle.SINGLE}, bottom: {style: BorderStyle.SINGLE}, left: {style: BorderStyle.SINGLE}, right: {style: BorderStyle.SINGLE} }
                                    })
                                ]
                            })
                        ]
                    })
                );
            }
            if (i < students.length - 1) content.push(new Paragraph({ children: [new PageBreak()] }));
        });

        const doc = new Document({ sections: [{ children: content }] });
        const blob = await Packer.toBlob(doc);
        saveAs(blob, `Hồ_sơ_VDC_Batch_${comp}.docx`);
    }
</script>
</body>
</html>
