<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VDC System V1.85 - Stable Engine</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f1f5f9; }
        .sidebar { background-color: #0f172a; }
        .drop-zone { border: 2px dashed #cbd5e1; background: white; cursor: pointer; transition: 0.3s; }
        .drop-zone:hover { border-color: #10b981; background-color: #f0fdf4; }
    </style>
</head>
<body class="flex h-screen overflow-hidden">

    <aside class="sidebar w-64 text-white flex flex-col hidden lg:flex">
        <div class="p-6 text-xl font-bold border-b border-slate-700 text-center text-emerald-400">
            VDC SYSTEM <span class="text-xs block font-normal text-slate-400">v1.85 @Stable</span>
        </div>
        <div class="mt-auto p-4 border-t border-slate-700">
            <p class="text-[10px] text-slate-500 uppercase tracking-widest">MST (A4)</p>
            <p id="mst-display" class="font-mono text-emerald-500 font-bold text-sm">---</p>
        </div>
    </aside>

    <main class="flex-1 flex flex-col min-w-0">
        <header class="h-16 bg-white border-b flex items-center justify-between px-8 shadow-sm">
            <h1 id="company-display" class="text-sm font-bold text-slate-800 uppercase">HỆ THỐNG ĐANG SẴN SÀNG...</h1>
        </header>

        <div class="p-6 overflow-y-auto space-y-6">
            <div id="drop-zone" class="drop-zone p-10 rounded-2xl text-center shadow-sm border-2">
                <i class="fas fa-file-excel text-3xl text-emerald-500 mb-2"></i>
                <h3 class="text-slate-700 font-bold italic">Bấm chọn hoặc Kéo thả file TTHV.xlsx vào đây</h3>
                <input type="file" id="file-input" class="hidden">
            </div>

            <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
                <div class="p-3 bg-slate-50 border-b flex justify-between items-center">
                    <span id="count-display" class="text-xs font-bold text-emerald-600 uppercase">Dữ liệu học viên</span>
                </div>
                <div class="max-h-[60vh] overflow-y-auto">
                    <table class="w-full text-left text-xs">
                        <thead class="bg-white sticky top-0 shadow-sm z-10 text-slate-400 uppercase">
                            <tr>
                                <th class="p-4 border-b">Nhóm</th>
                                <th class="p-4 border-b">Họ và Tên</th>
                                <th class="p-4 border-b">CCCD</th>
                                <th class="p-4 border-b text-center">Trạng thái</th>
                            </tr>
                        </thead>
                        <tbody id="table-body" class="divide-y divide-slate-100 text-slate-600 font-medium">
                            <tr><td colspan="4" class="p-20 text-center text-slate-300 italic font-normal">Đang chờ anh nạp file .xlsx chuẩn...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <script>
        const fileInput = document.getElementById('file-input');
        const dropZone = document.getElementById('drop-zone');
        const tableBody = document.getElementById('table-body');

        dropZone.onclick = () => fileInput.click();

        fileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;

            tableBody.innerHTML = '<tr><td colspan="4" class="p-20 text-center"><i class="fas fa-spinner fa-spin text-2xl text-emerald-500"></i><br>Đang quét dữ liệu...</td></tr>';

            const reader = new FileReader();
            reader.onload = (event) => {
                try {
                    const data = new Uint8Array(event.target.result);
                    const workbook = XLSX.read(data, { type: 'array' });
                    const firstSheet = workbook.Sheets[workbook.SheetNames[0]];

                    // Lấy MST (A4), Tên Cty (A3)
                    document.getElementById('mst-display').innerText = firstSheet['A4'] ? firstSheet['A4'].v : "---";
                    document.getElementById('company-display').innerText = (firstSheet['A3'] ? firstSheet['A3'].v : "CHƯA RÕ").toUpperCase();

                    // Chuyển Sheet sang dạng JSON
                    const jsonData = XLSX.utils.sheet_to_json(firstSheet, { header: 1 });
                    
                    tableBody.innerHTML = '';
                    let currentGroup = "N/A";
                    let count = 0;

                    jsonData.forEach((row, index) => {
                        if (index < 9) return; // Bỏ qua 10 dòng đầu

                        const colA = row[0] ? row[0].toString().trim() : "";
                        const colB = row[1] ? row[1].toString().trim() : "";

                        if (colA.toLowerCase().includes("nhóm")) {
                            currentGroup = colA;
                        } else if (colB !== "" && !["người lập", "giám đốc", "họ tên"].some(w => colB.toLowerCase().includes(w))) {
                            const cccd = row[6] || "---"; // Cột G
                            
                            const tr = document.createElement('tr');
                            tr.innerHTML = `
                                <td class="p-4 font-bold text-blue-600 italic">${currentGroup}</td>
                                <td class="p-4 font-bold text-slate-800">${colB}</td>
                                <td class="p-4 font-mono">${cccd}</td>
                                <td class="p-4 text-center"><span class="bg-green-100 text-green-700 px-3 py-1 rounded-full text-[10px] font-bold">SẴN SÀNG</span></td>
                            `;
                            tableBody.appendChild(tr);
                            count++;
                        }
                    });
                    document.getElementById('count-display').innerText = `Đã tìm thấy ${count} học viên`;

                } catch (err) {
                    console.error(err);
                    alert("Lỗi đọc file! Anh hãy thử lưu file ở định dạng 'Excel Workbook (*.xlsx)' thay vì các định dạng khác.");
                    tableBody.innerHTML = '<tr><td colspan="4" class="p-20 text-center text-red-500">LỖI XỬ LÝ DỮ LIỆU</td></tr>';
                }
            };
            reader.readAsArrayBuffer(file);
        });
    </script>
</body>
</html>
