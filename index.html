<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VDC Đào tạo - Khắc phục Treo v2.3</title>
    
    <script src="https://cdn.jsdelivr.net/npm/pizzip@3.1.4/dist/pizzip.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/docxtemplater@3.42.0/build/docxtemplater.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/file-saver@2.0.5/dist/FileSaver.min.js"></script>
    <script src="https://open-xml-templating.github.io/docxtemplater-image-module/build/docxtemplater-image-module.js"></script>

    <style>
        :root { --vdc-gold: #d4a017; --vdc-blue: #003366; }
        body { font-family: 'Times New Roman', serif; background: #f4f4f4; padding: 20px; }
        .app-card { max-width: 900px; margin: auto; background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); border-top: 6px solid var(--vdc-gold); position: relative; }
        
        /* Hiển thị trạng thái tải */
        #loading-zone { background: #fff3cd; padding: 15px; border-radius: 5px; text-align: center; margin-bottom: 20px; border: 1px solid #ffeeba; }
        .hidden { display: none !important; }
        
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px; }
        input { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        
        .btn-group { display: flex; gap: 15px; justify-content: center; margin-top: 20px; }
        .btn { padding: 12px 25px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; color: white; }
        .btn-blue { background: var(--vdc-blue); }
        .btn-gold { background: var(--vdc-gold); }
        .img-box { width: 60px; height: 80px; background: #eee; border: 1px solid #ddd; margin-top: 5px; }
    </style>
</head>
<body>

<div class="app-card">
    <div id="loading-zone">
        <strong id="load-status">⏳ Đang khởi tạo thư viện xử lý Word...</strong>
        <p style="font-size: 12px; margin-top: 5px;">Nếu bị treo quá lâu, vui lòng kiểm tra kết nối mạng.</p>
        <button onclick="forceStart()" style="margin-top:10px; font-size:11px; cursor:pointer;">Ép chạy (Nếu F5 không được)</button>
    </div>

    <div id="main-app" class="hidden">
        <h2 style="color:var(--vdc-blue); text-align:center; margin-top:0;">HỆ THỐNG IN THẺ VDC v2.3</h2>
        
        <div class="form-grid">
            <div><label>Tên đơn vị</label><input type="text" id="comp" value="Công ty VDC"></div>
            <div><label>Mã thẻ</label><input type="text" id="code" value="VDC-2026-01"></div>
        </div>

        <table style="width:100%; border-collapse:collapse;">
            <thead>
                <tr style="background:var(--vdc-blue); color:white;">
                    <th style="padding:10px;">Học viên</th>
                    <th>Ảnh 3x4</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td style="padding:10px; border:1px solid #ddd;">
                        <input type="text" id="name" value="Nguyễn Minh Hòa" style="margin-bottom:5px;"><br>
                        <input type="text" id="dob" value="01/01/1967">
                    </td>
                    <td style="padding:10px; border:1px solid #ddd; text-align:center;">
                        <input type="file" accept="image/*" onchange="handleImg(this)">
                        <img id="preview" class="img-box" src="">
                    </td>
                </tr>
            </tbody>
        </table>

        <div class="btn-group">
            <button class="btn btn-blue" onclick="processDoc('Mattruoc.docx')">XUẤT MẶT TRƯỚC</button>
            <button class="btn btn-gold" onclick="processDoc('Matsau.docx')">XUẤT MẶT SAU</button>
        </div>
    </div>
</div>

<script>
    // Kiểm tra sự tồn tại của thư viện mỗi 1 giây
    const checkInterval = setInterval(() => {
        if (typeof window.PizZip !== 'undefined' && typeof window.docxtemplater !== 'undefined') {
            document.getElementById('loading-zone').classList.add('hidden');
            document.getElementById('main-app').classList.remove('hidden');
            clearInterval(checkInterval);
        }
    }, 1000);

    function forceStart() {
        document.getElementById('loading-zone').classList.add('hidden');
        document.getElementById('main-app').classList.remove('hidden');
    }

    function handleImg(input) {
        const reader = new FileReader();
        reader.onload = (e) => document.getElementById('preview').src = e.target.result;
        if(input.files[0]) reader.readAsDataURL(input.files[0]);
    }

    async function processDoc(templateName) {
        try {
            const resp = await fetch(templateName);
            if (!resp.ok) throw new Error("Không tìm thấy file mẫu " + templateName);
            const arrayBuffer = await resp.arrayBuffer();

            const zip = new PizZip(arrayBuffer);
            const imageOptions = {
                getImage: (tag) => {
                    const b64 = tag.split(',')[1];
                    const bin = window.atob(b64);
                    const res = new Uint8Array(bin.length);
                    for (let i = 0; i < bin.length; i++) res[i] = bin.charCodeAt(i);
                    return res;
                },
                getSize: () => [113, 151] // 3x4cm
            };

            const imgModule = new window.ImageModule(imageOptions);
            const doc = new window.docxtemplater(zip, { modules: [imgModule] });

            doc.render({
                Đơn_vị_: document.getElementById('comp').value,
                Họ_và_tên: document.getElementById('name').value,
                Sinh_ngày: document.getElementById('dob').value,
                Mã_thẻ: document.getElementById('code').value,
                Hinh_anh: document.getElementById('preview').src // Chuỗi Base64
            });

            const out = doc.getZip().generate({ type: "blob" });
            saveAs(out, `Ket_qua_${templateName}`);
        } catch (e) {
            alert("Lỗi: " + e.message);
        }
    }
</script>
</body>
</html>
