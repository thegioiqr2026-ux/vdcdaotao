<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VDC Đào tạo - Fix PizZip & Image v2.1</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pizzip/3.1.4/pizzip.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/docxtemplater/3.42.0/docxtemplater.js"></script>
    <script src="https://open-xml-templating.github.io/docxtemplater-image-module/build/docxtemplater-image-module.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>

    <style>
        :root { --vdc-gold: #d4a017; --vdc-blue: #003366; }
        body { font-family: 'Times New Roman', serif; background: #f4f4f4; padding: 20px; }
        .app-card { max-width: 1000px; margin: auto; background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); border-top: 6px solid var(--vdc-gold); }
        .status-msg { background: #fff3cd; color: #856404; padding: 10px; border-radius: 4px; margin-bottom: 20px; text-align: center; font-size: 14px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th { background: var(--vdc-blue); color: white; padding: 10px; }
        td { border: 1px solid #ddd; padding: 8px; }
        .btn-group { display: flex; gap: 15px; margin-top: 30px; justify-content: center; }
        .btn { padding: 12px 25px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
        .btn-front { background: var(--vdc-blue); color: white; }
        .btn-back { background: var(--vdc-gold); color: white; }
        .img-preview { width: 40px; height: 50px; object-fit: cover; border: 1px solid #ccc; display: block; margin-top: 5px; }
    </style>
</head>
<body>

<div class="app-card">
    <div style="float:right; font-size:12px">v2.1</div>
    <h2 style="color:var(--vdc-blue); text-align:center">HỆ THỐNG XUẤT THẺ VDC (FIX PIZZIP)</h2>
    
    <div class="status-msg">
        Lưu ý: Đảm bảo file <b>Mattruoc.docx</b> có thẻ <b>{%Hinh_anh}</b> và <b>Matsau.docx</b> có các thẻ <b>{Họ_và_tên}</b>.
    </div>

    <table id="stTable">
        <thead>
            <tr>
                <th>Họ tên</th>
                <th>Thông tin thẻ</th>
                <th width="20%">Ảnh 3x4</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td><input type="text" class="st-name" value="Nguyễn Minh Hòa" style="width:95%"></td>
                <td>
                    Mã: <input type="text" class="st-code" value="VDC-N3-001"><br>
                    Ngày: <input type="text" class="st-dob" value="01/01/1967">
                </td>
                <td>
                    <input type="file" accept="image/*" onchange="previewImg(this)">
                    <img class="img-preview" src="">
                </td>
            </tr>
        </tbody>
    </table>

    <div class="btn-group">
        <button class="btn btn-front" onclick="generateBatch('Mattruoc.docx')">XUẤT MẶT TRƯỚC (CÓ ẢNH)</button>
        <button class="btn btn-back" onclick="generateBatch('Matsau.docx')">XUẤT MẶT SAU</button>
    </div>
</div>

<script>
    // Xử lý xem trước và lưu Base64 ảnh
    function previewImg(input) {
        const reader = new FileReader();
        reader.onload = function(e) {
            input.nextElementSibling.src = e.target.result;
        };
        reader.readAsDataURL(input.files[0]);
    }

    // Cấu hình Image Module cho docxtemplater
    const imageOptions = {
        getImage(tagValue) {
            return b64ToUint8Array(tagValue.split(',')[1]);
        },
        getSize() {
            return [113, 151]; // Tương đương ảnh 3x4 cm trong Word
        }
    };

    function b64ToUint8Array(b64) {
        const bin = window.atob(b64);
        const len = bin.length;
        const u8 = new Uint8Array(len);
        for (let i = 0; i < len; i++) u8[i] = bin.charCodeAt(i);
        return u8;
    }

    async function generateBatch(templateName) {
        try {
            // Kiểm tra thư viện
            if (typeof window.PizZip === 'undefined') {
                throw new Error("Thư viện PizZip chưa tải xong. Vui lòng kiểm tra internet và F5 trang.");
            }

            const response = await fetch(templateName);
            if (!response.ok) throw new Error(`Không tìm thấy file ${templateName} trong thư mục.`);
            const content = await response.arrayBuffer();

            const zip = new PizZip(content);
            const imageModule = new window.ImageModule(imageOptions);
            const doc = new window.docxtemplater(zip, {
                modules: [imageModule],
                paragraphLoop: true,
                linebreaks: true
            });

            const rows = document.querySelectorAll("#stTable tbody tr");
            const students = [];

            rows.forEach(row => {
                students.push({
                    Họ_và_tên: row.querySelector(".st-name").value,
                    Sinh_ngày: row.querySelector(".st-dob").value,
                    Mã_thẻ: row.querySelector(".st-code").value,
                    Hinh_anh: row.querySelector(".img-preview").src // Chuỗi Base64
                });
            });

            // Đổ dữ liệu vào template
            doc.render({
                Đơn_vị_: "CÔNG TY CP HTQT VDC",
                Học_viên: students,
                // Map dữ liệu cho bản ghi đầu tiên (nếu template không dùng loop)
                ...students[0]
            });

            const out = doc.getZip().generate({
                type: "blob",
                mimeType: "application/vnd.openxmlformats-officedocument.wordprocessingml.document",
            });

            saveAs(out, `Ket_qua_${templateName}`);

        } catch (error) {
            console.error(error);
            alert("Lỗi: " + error.message);
        }
    }
</script>
</body>
</html>
