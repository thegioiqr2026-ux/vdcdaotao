<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VDC - In Thẻ Từ Mẫu v1.9</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/docxtemplater/3.42.0/docxtemplater.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pizzip/3.1.4/pizzip.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    <style>
        :root { --vdc-gold: #d4a017; --vdc-blue: #003366; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #f8f9fa; padding: 20px; }
        .app-card { max-width: 900px; margin: auto; background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); border-top: 5px solid var(--vdc-gold); }
        .status-bar { padding: 10px; margin-bottom: 20px; border-radius: 4px; font-size: 13px; text-align: center; background: #e7f3ff; color: #004085; }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px; }
        input, select { padding: 10px; border: 1px solid #ddd; border-radius: 4px; width: 100%; box-sizing: border-box; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th { background: var(--vdc-blue); color: white; padding: 10px; }
        td { border: 1px solid #ddd; padding: 5px; }
        .btn-group { display: flex; gap: 10px; justify-content: center; margin-top: 30px; }
        .btn { padding: 12px 25px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; color: white; }
        .btn-primary { background: var(--vdc-blue); }
        .btn-secondary { background: var(--vdc-gold); }
    </style>
</head>
<body>

<div class="app-card">
    <div style="float:right; font-size:12px">v1.9</div>
    <h2 style="color:var(--vdc-blue); text-align:center">HỆ THỐNG ĐỔ DỮ LIỆU THẺ VDC</h2>
    
    <div class="status-bar">
        ⚡ Hệ thống sẽ tự động tìm file <b>Mattruoc.docx</b> và <b>Matsau.docx</b> trong cùng thư mục.
    </div>

    <div class="form-row">
        <div><label>Nội dung huấn luyện</label><input type="text" id="course_name" value="An toàn vệ sinh lao động"></div>
        <div><label>Địa điểm & Ngày cấp</label><input type="text" id="loc_date" value="Thanh Hóa, ngày 21 tháng 03 năm 2026"></div>
    </div>

    <table id="stTable">
        <thead>
            <tr>
                <th>Họ và tên</th>
                <th>Năm sinh</th>
                <th>Công việc</th>
                <th>Mã thẻ</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td><input type="text" class="st-name" style="width:100%; border:none" value="Nguyễn Minh Hòa"></td>
                <td><input type="text" class="st-dob" style="width:100%; border:none" value="01/01/1967"></td>
                <td><input type="text" class="st-job" style="width:100%; border:none" value="Phòng M&E"></td>
                <td><input type="text" class="st-code" style="width:100%; border:none" value="VDC-2026-001"></td>
            </tr>
        </tbody>
    </table>

    <div class="btn-group">
        <button class="btn btn-primary" onclick="generateFromTemplate('Mattruoc.docx')">XUẤT MẶT TRƯỚC</button>
        <button class="btn btn-secondary" onclick="generateFromTemplate('Matsau.docx')">XUẤT MẶT SAU</button>
    </div>
</div>

<script>
    // Hàm đọc file từ Server/Github
    async function loadFile(url) {
        const response = await fetch(url);
        if (!response.ok) throw new Error(`Không tìm thấy file: ${url}`);
        return await response.arrayBuffer();
    }

    async function generateFromTemplate(fileName) {
        try {
            const templateBuffer = await loadFile(fileName);
            const zip = new PizZip(templateBuffer);
            const doc = new window.docxtemplater(zip, { paragraphLoop: true, linebreaks: true });

            // Thu thập dữ liệu từ bảng 
            const rows = document.querySelectorAll("#stTable tbody tr");
            const data = {
                Đơn_vị_: "CÔNG TY CỔ PHẦN HỢP TÁC QUỐC TẾ VDC", // Khớp với <<Đơn_vị_>>
                Nội_dung_HL: document.getElementById("course_name").value,
                Ngày_cấp: document.getElementById("loc_date").value,
                Học_viên: [] // Danh sách lặp cho các Record tiếp theo
            };

            rows.forEach(row => {
                data.Học_viên.push({
                    Họ_và_tên: row.querySelector(".st-name").value,
                    Sinh_ngày: row.querySelector(".st-dob").value,
                    Công_việc: row.querySelector(".st-job").value,
                    Mã_thẻ: row.querySelector(".st-code").value
                });
            });

            // Đổ dữ liệu vào các thẻ <<tag>>
            // Lưu ý: Nếu mẫu dùng dạng lặp, bạn cần cấu hình khớp với tên tag trong docx
            doc.render({
                ...data,
                Họ_và_tên: data.Học_viên[0].Họ_và_tên,
                Sinh_ngày: data.Học_viên[0].Sinh_ngày,
                Công_việc: data.Học_viên[0].Công_việc,
                Mã_thẻ: data.Học_viên[0].Mã_thẻ
            });

            const out = doc.getZip().generate({ type: "blob", mimeType: "application/vnd.openxmlformats-officedocument.wordprocessingml.document" });
            saveAs(out, `In_The_VDC_${fileName}`);

        } catch (error) {
            console.error(error);
            alert("Lỗi: " + error.message);
        }
    }
</script>
</body>
</html>
